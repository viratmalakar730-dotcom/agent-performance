<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Final Dashboard</h2>

<table id="dataTable">
<thead>
<tr>
<th>Agent Name</th>
<th>Total Login</th>
<th>Total Break</th>
<th>Net Login</th>
<th>Total Meeting</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
const data = JSON.parse(localStorage.getItem("finalData") || "[]");
const table = document.querySelector("#dataTable tbody");

data.forEach(row => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
    <td>${row["Agent Name"]}</td>
    <td>${row["Total Login"]}</td>
    <td>${row["Total Break"]}</td>
    <td>${row["Net Login"]}</td>
    <td>${row["Total Meeting"]}</td>
    `;

    table.appendChild(tr);
});
</script>

</body>
</html>
