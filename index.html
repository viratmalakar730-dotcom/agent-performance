<!DOCTYPE html>
<html>
<head>
    <title>Upload Reports</title>
    <link rel="stylesheet" href="style.css">

    <!-- XLSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/7.20.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/7.20.0/firebase-database.js"></script>
</head>
<body>

<div class="container">
    <div class="upload-box">

        <h2>Agent Performance Dashboard</h2>

        <p class="label">APR File</p>
        <input type="file" id="aprFile"><br><br>

        <p class="label">CDR File</p>
        <input type="file" id="cdrFile"><br><br>

        <button onclick="processFiles()">Generate Dashboard</button>

        <p id="loading" class="loading">Processing... ⏳</p>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
