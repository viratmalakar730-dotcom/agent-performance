<!DOCTYPE html>
<html>
<head>
<title>Upload</title>

<link rel="stylesheet" href="style.css">

<!-- ✅ Responsive -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<!-- 🔐 PASSWORD GATE -->
<script>
(function(){

    const CORRECT_PASSWORD = "1122";
    const MAX_ATTEMPT = 3;

    let attempts = 0;

    function askPassword(){

        let saved = localStorage.getItem("auth_ok");

        if(saved === "true") return;

        while(attempts < MAX_ATTEMPT){

            let pass = prompt("🔐 Enter Access Code");

            if(pass === CORRECT_PASSWORD){
                localStorage.setItem("auth_ok","true");
                return;
            }

            attempts++;
            alert("❌ Wrong Code (" + attempts + "/3)");
        }

        // 🔒 Lock after 3 attempts
        document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:100px;'>🚫 Access Blocked</h2>";
    }

    askPassword();

})();
</script>

<div class="container">
<div class="box">

<h2>📂 Upload Required Data</h2>

<p>📊 Upload Agent Performance (APR)</p>
<input type="file" id="aprFile" onchange="showFileName('aprFile','aprName')">
<div id="aprName" style="font-size:12px;color:#9ca3af;"></div>

<p>📞 Upload CDR Report</p>
<input type="file" id="cdrFile" onchange="showFileName('cdrFile','cdrName')">
<div id="cdrName" style="font-size:12px;color:#9ca3af;"></div>

<button id="generateBtn" onclick="processFiles()">🚀 Generate Dashboard</button>

<!-- 🔄 Loading -->
<div id="loading" style="display:none; margin-top:10px;">
⏳ Processing... Please wait
</div>

</div>
</div>

<!-- Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- 🔥 Helper Script -->
<script>
function showFileName(inputId, displayId){
    let file = document.getElementById(inputId).files[0];
    if(file){
        document.getElementById(displayId).innerText = "✔ " + file.name;
    }
}
</script>

<!-- Main Script -->
<script src="script.js"></script>

<!-- 🔥 UX Upgrade -->
<script>
const originalProcess = window.processFiles;

window.processFiles = function(){

    let apr = document.getElementById("aprFile").files[0];
    let cdr = document.getElementById("cdrFile").files[0];

    if(!apr || !cdr){
        alert("⚠️ Please upload both APR & CDR files");
        return;
    }

    // 🔄 UI Update
    document.getElementById("loading").style.display = "block";

    let btn = document.getElementById("generateBtn");
    btn.innerText = "⏳ Processing...";
    btn.disabled = true;

    // 🔥 Call original
    originalProcess();
};

// 🔥 ENTER KEY SUPPORT
document.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        let btn = document.getElementById("generateBtn");
        if(btn && !btn.disabled){
            btn.click();
        }
    }
});
</script>

</body>
</html>
