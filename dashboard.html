<!DOCTYPE html>
<html>
<head>
    <title>Agent Performance Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔥 3D TITLE (NO CHANGE NEEDED) -->
<h2>Live Agent Performance Dashboard</h2>

<!-- 🔥 3D REPORT TIME (UPDATED) -->
<div class="report-time">
    Report Time: <span id="reportTime"></span>
</div>

<!-- 🔥 SUMMARY CARDS (UNCHANGED) -->
<div class="cards">
    <div class="card">IVR Hit<br><span id="ivr"></span></div>
    <div class="card">Total Mature Calls<br><span id="total"></span></div>
    <div class="card">Connected<br><span id="conn"></span></div>
    <div class="card">Not Connected<br><span id="notconn"></span></div>
</div>

<!-- 🔥 TABLE (UNCHANGED) -->
<table id="dataTable">
    <thead>
        <tr>
            <th>Agent Name</th>
            <th>Total Login</th>
            <th>Talk Time</th>
            <th>Break</th>
            <th>Net Login</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script src="script.js"></script>

</body>
</html>
