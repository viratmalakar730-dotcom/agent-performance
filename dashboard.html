<!DOCTYPE html>
<html>
<head>
<title>Live Agent Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

</head>

<body>

<div class="top-banner">
    <div class="title-card">Live Agent Performance Dashboard</div>
    <div class="time-card" id="reportTime">Report Time:</div>
</div>

<div class="cards">
    <div class="card">IVR Hit<br><span id="ivr"></span></div>
    <div class="card">Total Mature Calls<br><span id="total"></span></div>
    <div class="card">IB Mature<br><span id="ib"></span></div>
    <div class="card">OB Mature<br><span id="ob"></span></div>
    <div class="card">Overall AHT<br><span id="aht"></span></div>
</div>

<input type="text" id="search" placeholder="Search Agent..." onkeyup="searchAgent()">

<div>
    <button onclick="copyImage()">📸 Copy PNG</button>
    <button onclick="exportExcel()">📊 Export Excel</button>
    <button onclick="resetApp()">🔄 Reset</button>
</div>

<table id="table">
<thead>
<tr>
<th>Employee ID</th>
<th>Agent Full Name</th>
<th>Total Login</th>
<th>Net Login</th>
<th>Total Break</th>
<th>Total Meeting</th>
<th>AHT</th>
<th>Total Mature Call</th>
<th>IB Mature</th>
<th>OB Mature</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script src="script.js"></script>

</body>
</html>
