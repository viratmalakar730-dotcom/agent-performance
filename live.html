<!DOCTYPE html>
<html>
<head>
    <title>Live Dashboard</title>
</head>
<body>

<h2 style="text-align:center;">Live Dashboard</h2>

<table border="1" width="100%" id="table">
<thead>
<tr>
<th>Emp</th>
<th>Name</th>
<th>Total Calls</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

onSnapshot(doc(db,"dashboard","latest"), (snap)=>{

    if(!snap.exists()) return;

    let d = snap.data();
    let tb = document.querySelector("#table tbody");
    tb.innerHTML = "";

    d.final.forEach(r=>{
        let tr = document.createElement("tr");
        tr.innerHTML = `<td>${r.emp}</td><td>${r.name}</td><td>${r.total}</td>`;
        tb.appendChild(tr);
    });

});

</script>

</body>
</html>
