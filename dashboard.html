<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">

<!-- ✅ Responsive -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<h2>📊 Agent Performance Dashboard</h2>

<div id="reportTime"></div>

<input type="text" id="search" placeholder="🔍 Search..." onkeyup="searchTable()">

<!-- 🔥 ACTION BUTTONS -->
<div style="margin:10px;">
<button onclick="exportExcel()">📤 Excel</button>
<button onclick="downloadPNG()">📋 Copy</button>
<button onclick="resetDashboard()">🔄 Reset</button>
</div>

<!-- 🔊 SOUND -->
<audio id="notifySound" src="sounds/notify.mp3"></audio>

<!-- 🔔 ALERT -->
<div id="liveAlert">🚀 Agent Performance Report Updated</div>

<!-- 📊 CARDS -->
<div id="cards"></div>

<!-- 📋 TABLE -->
<div class="table-container">
<table id="table">
<thead>
<tr>
<th>S.No</th>
<th>Employee ID</th>
<th>Agent Full Name</th>
<th>Total Login</th>
<th>Net Login</th>
<th>Total Break</th>
<th>Total Meeting</th>
<th>AHT</th>
<th>Total Mature</th>
<th>IB Mature</th>
<th>OB Mature</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<!-- 📚 LIBS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- MAIN SCRIPT -->
<script src="script.js"></script>

</body>
</html>
