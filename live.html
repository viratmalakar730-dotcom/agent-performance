<!DOCTYPE html>
<html>
<head>
    <title>Live Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2 style="text-align:center;">Live Agent Dashboard</h2>

<div id="dashboard"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 AUTO LIVE UPDATE
onSnapshot(doc(db, "dashboard", "latest"), (docSnap) => {
    if (docSnap.exists()) {
        const data = docSnap.data().data;
        renderDashboard(data);
    }
});

// 👉 Tumhara existing render function yaha copy karna
function renderDashboard(data) {
    document.getElementById("dashboard").innerHTML = JSON.stringify(data);
}
</script>

</body>
</html>
