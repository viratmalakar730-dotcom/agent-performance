<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Agent Dashboard</h2>

<div class="cards">
<div class="card">IVR Hit<br><span id="ivr"></span></div>
<div class="card">Total Mature Calls<br><span id="total"></span></div>
<div class="card">IB Mature<br><span id="ib"></span></div>
<div class="card">OB Mature<br><span id="ob"></span></div>
<div class="card">Overall AHT<br><span id="aht"></span></div>
</div>

<button onclick="resetApp()">Reset</button>

<table id="table">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Total Login</th>
<th>Net Login</th>
<th>Break</th>
<th>Meeting</th>
<th>AHT</th>
<th>Total Mature</th>
<th>IB</th>
<th>OB</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script src="script.js"></script>
</body>
</html>
