<!DOCTYPE html>
<html>
<head>
<title>Live Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Live Agent Dashboard</h2>

<div class="cards">
    <div class="card">IVR Hit<br><span id="ivr"></span></div>
    <div class="card">Total Mature Calls<br><span id="total"></span></div>
    <div class="card">IB Mature<br><span id="ib"></span></div>
    <div class="card">OB Mature<br><span id="ob"></span></div>
</div>

<table id="table">
<thead>
<tr>
<th>Employee ID</th>
<th>Name</th>
<th>Total</th>
<th>IB</th>
<th>OB</th>
</tr>
</thead>
<tbody></tbody>
</table>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCzPyZwPnSST3lv1pnSibq3dQjVIg2o-xs",
  authDomain: "agent-performance-live.firebaseapp.com",
  databaseURL: "https://agent-performance-live-default-rtdb.firebaseio.com/",
  projectId: "agent-performance-live",
  storageBucket: "agent-performance-live.firebasestorage.app",
  messagingSenderId: "659246273681",
  appId: "1:659246273681:web:dcc9881594904598315b30"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔴 LIVE LISTENER
db.ref("dashboard").on("value", snap => {

    let data = snap.val();
    if(!data) return;

    document.getElementById("ivr").innerText = data.ivr;

    let tb = document.querySelector("#table tbody");
    tb.innerHTML = "";

    let totalCalls = 0;
    let totalIB = 0;
    let totalOB = 0;

    data.final.forEach(r=>{
        totalCalls += r.total;
        totalIB += r.ib;
        totalOB += r.ob;

        tb.innerHTML += `
        <tr>
        <td>${r.emp}</td>
        <td>${r.name}</td>
        <td>${r.total}</td>
        <td>${r.ib}</td>
        <td>${r.ob}</td>
        </tr>`;
    });

    document.getElementById("total").innerText = totalCalls;
    document.getElementById("ib").innerText = totalIB;
    document.getElementById("ob").innerText = totalOB;
});
</script>

</body>
</html>
