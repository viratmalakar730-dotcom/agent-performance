<!DOCTYPE html>
<html>
<head>
    <title>Agent Performance Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔥 TOP 3D HEADER -->
<div class="top-banner">
    <div class="title-card">Agent Performance Dashboard</div>
    <div class="time-card" id="reportTime"></div>
</div>

<!-- 🔥 SUMMARY -->
<div class="cards">
    <div class="card">IVR Hit<br><span id="ivr"></span></div>
    <div class="card">Total Mature Calls<br><span id="total"></span></div>
    <div class="card">IB Mature<br><span id="ib"></span></div>
    <div class="card">OB Mature<br><span id="ob"></span></div>
    <div class="card">Overall AHT<br><span id="aht"></span></div>
</div>

<input type="text" id="search" placeholder="Search Agent...">

<br>

<button onclick="copyImage()">Copy PNG</button>
<button onclick="exportExcel()">Export Excel</button>
<button onclick="location.reload()">Reset</button>

<!-- 🔥 TABLE -->
<table id="table">
    <thead>
        <tr>
            <th>EMPLOYEE ID</th>
            <th>AGENT FULL NAME</th>
            <th>TOTAL LOGIN</th>
            <th>NET LOGIN</th>
            <th>TOTAL BREAK</th>
            <th>TOTAL MEETING</th>
            <th>AHT</th>
            <th>TOTAL MATURE CALL</th>
            <th>IB MATURE</th>
            <th>OB MATURE</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script src="script.js"></script>
</body>
</html>
