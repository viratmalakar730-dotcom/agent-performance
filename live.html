<!DOCTYPE html>
<html>
<head>
<title>Live Dashboard</title>

<link rel="stylesheet" href="style.css">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<h2>📊 Agent Performance Dashboard</h2>

<div id="reportTime"></div>

<!-- 🔍 SEARCH (ADDED BACK) -->
<div style="text-align:center;">
    <input 
        type="text" 
        id="search" 
        placeholder="🔍 Search Agent / ID..." 
        onkeyup="searchTable()"
        style="padding:10px; width:260px; border-radius:8px; border:none; margin:10px;"
    >
</div>

<div id="cards"></div>

<div class="table-container">
<table id="table">

<thead>
<tr>
<th>S.No</th>
<th>Employee ID</th>
<th>Agent Full Name</th>
<th>Total Login</th>
<th>Net Login</th>
<th>Total Break</th>
<th>Total Meeting</th>
<th>AHT</th>
<th>Total Mature</th>
<th>IB Mature</th>
<th>OB Mature</th>
</tr>
</thead>

<tbody></tbody>

</table>
</div>

<!-- ❤️ SIMPLE BRANDING -->
<div id="brandingLive">❤️ Powered by Chandan Malakar ❤️</div>

<!-- 🔊 SOUND -->
<audio id="notifySound" src="sounds/notify.mp3"></audio>

<!-- 🔔 ALERT -->
<div id="liveAlert">🚀 Agent Performance Report Updated</div>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- MAIN SCRIPT -->
<script src="script.js"></script>

</body>
</html>
