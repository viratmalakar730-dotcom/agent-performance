<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Agent Performance Dashboard</h2>

<!-- SUMMARY CARDS -->
<div class="cards">
<div class="card">IVR Hit<br><span id="ivr"></span></div>
<div class="card">Total Mature Calls<br><span id="totalCalls"></span></div>
<div class="card">IB Mature<br><span id="ibCalls"></span></div>
<div class="card">OB Mature<br><span id="obCalls"></span></div>
<div class="card">Overall AHT<br><span id="aht"></span></div>
</div>

<button onclick="exportExcel()">Export Excel</button>
<button onclick="copyImage()">Copy PNG</button>

<table id="dataTable">
<thead>
<tr>
<th>Employee ID</th>
<th>Agent Full Name</th>
<th>Total Login</th>
<th>Net Login</th>
<th>Total Break</th>
<th>Total Meeting</th>
<th>AHT</th>
<th>Total Mature Call</th>
<th>IB Mature</th>
<th>OB Mature</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="script.js"></script>

</body>
</html>
