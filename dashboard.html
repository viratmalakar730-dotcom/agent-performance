<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
.table-container{
    max-height:520px;
    overflow:auto;
}
thead th{
    position:sticky;
    top:0;
    z-index:5;
}
</style>

</head>

<body>

<h2>📊 Agent Performance Dashboard</h2>

<div id="reportTime"></div>

<!-- 🔥 SEARCH -->
<input type="text" id="search" placeholder="Search Agent..." onkeyup="searchTable()" style="padding:8px;width:250px;margin:10px;">

<!-- 🔥 BUTTONS -->
<div>
<button onclick="exportExcel()">📤 Excel</button>
<button onclick="downloadPNG()">📋 Copy</button>
<button onclick="resetDashboard()">🔄 Reset</button>
</div>

<!-- 🔥 CARDS -->
<div id="cards" style="display:flex;gap:15px;justify-content:center;flex-wrap:wrap;margin:15px;"></div>

<!-- TABLE -->
<div class="table-container">
<table id="table">

<thead>
<tr>
<th>S.No</th>
<th>Emp ID</th>
<th>Name</th>
<th>Login</th>
<th>Net Login</th>
<th>Break</th>
<th>Meeting</th>
<th>AHT</th>
<th>Total</th>
<th>IB</th>
<th>OB</th>
</tr>
</thead>

<tbody></tbody>

</table>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="script.js"></script>

</body>
</html>
