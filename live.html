<!DOCTYPE html>
<html>
<head>
    <title>Live Agent Performance Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2 style="text-align:center;">Live Agent Performance Dashboard</h2>

<!-- 🔥 DASHBOARD OUTPUT -->
<div id="dashboard"></div>

<!-- 🔥 FIREBASE + LIVE SYNC -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// ⚠️ SAME CONFIG use karo jo primary me use kiya
const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===============================
// 🔥 AUTO LIVE UPDATE
// ===============================
onSnapshot(doc(db, "dashboard", "latest"), (docSnap) => {

    if (docSnap.exists()) {
        const data = docSnap.data().data;

        renderDashboard(data);
    } else {
        document.getElementById("dashboard").innerHTML = "No Data Available";
    }
});

// ===============================
// 🔥 SAME RENDER FUNCTION (MATCH PRIMARY)
// ===============================
function renderDashboard(data) {

    let html = `<table border="1" style="width:100%; text-align:center;">
        <tr>
            <th>Agent</th>
            <th>Calls</th>
            <th>Total Talk</th>
            <th>AHT</th>
        </tr>`;

    data.forEach(d => {
        html += `
        <tr>
            <td>${d.agent}</td>
            <td>${d.calls}</td>
            <td>${d.talk}</td>
            <td>${d.aht.toFixed(2)}</td>
        </tr>`;
    });

    html += `</table>`;

    document.getElementById("dashboard").innerHTML = html;
}

</script>

</body>
</html>
