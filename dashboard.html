<!DOCTYPE html>
<html>
<head>
    <title>Agent Performance Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2 style="text-align:center;">Agent Performance Dashboard</h2>

<!-- 🔥 SUMMARY -->
<div class="cards" id="cards">
    <div class="card">IVR Hit<br><span id="ivr"></span></div>
    <div class="card">Total Mature Calls<br><span id="total"></span></div>
    <div class="card">IB Mature<br><span id="ib"></span></div>
    <div class="card">OB Mature<br><span id="ob"></span></div>
    <div class="card">Overall AHT<br><span id="aht"></span></div>
</div>

<!-- 🔍 SEARCH -->
<div style="text-align:center;">
<input type="text" id="search" placeholder="Search Agent..." onkeyup="searchAgent()">
</div>

<!-- 🔘 BUTTONS -->
<div style="text-align:center; margin:20px;">
    <button onclick="copyImage()">Copy PNG</button>
    <button onclick="exportExcel()">Export Excel</button>
    <button onclick="resetApp()">Reset</button>
</div>

<!-- 📊 TABLE -->
<table id="table">
<thead>
<tr id="headerRow">
<th>Employee ID</th>
<th>Agent Full Name</th>
<th>Total Login</th>
<th>Net Login</th>
<th>Total Break</th>
<th>Total Meeting</th>
<th>AHT</th>
<th>Total Mature Call</th>
<th>IB Mature</th>
<th>OB Mature</th>
</tr>
</thead>
<tbody></tbody>
</table>

<!-- ❤️ FOOTER -->
<div style="text-align:center; margin-top:20px; font-weight:bold;">
    ❤️ Powered by Chandan Malakar ❤️
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://unpkg.com/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

<script src="script.js"></script>

</body>
</html>
