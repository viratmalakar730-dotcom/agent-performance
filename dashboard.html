<!DOCTYPE html>
<html>
<head>
<title>Agent Performance Dashboard</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ================= TITLE ================= -->
<h2>📊 Agent Performance Dashboard</h2>

<!-- ================= REPORT TIME ================= -->
<div id="reportTime"></div>

<!-- ================= SEARCH ================= -->
<input 
    type="text" 
    id="search" 
    placeholder="🔍 Search Agent / ID..." 
    onkeyup="searchTable()"
    style="padding:10px; width:250px; border-radius:8px; border:none; margin:10px;"
>

<!-- ================= BUTTONS ================= -->
<div>
    <button onclick="exportExcel()">📤 Excel</button>
    <button onclick="downloadPNG()">📋 Copy</button>
    <button onclick="resetDashboard()">🔄 Reset</button>
</div>

<!-- ================= SOUND ================= -->
<audio id="notifySound" src="sounds/notify.mp3" preload="auto"></audio>

<!-- ================= ALERT ================= -->
<div id="liveAlert">🚀 New Data Updated</div>

<!-- ================= CARDS ================= -->
<div id="cards"></div>

<!-- ================= TABLE ================= -->
<div class="table-container">
<table id="table">

<thead>
<tr>
<th>S.No</th>
<th>Employee ID</th>
<th>Agent Full Name</th>
<th>Total Login</th>
<th>Net Login</th>
<th>Total Break</th>
<th>Total Meeting</th>
<th>AHT</th>
<th>Total Mature</th>
<th>IB Mature</th>
<th>OB Mature</th>
</tr>
</thead>

<tbody></tbody>

</table>
</div>

<!-- ================= BRANDING ================= -->
<div id="branding">Powered by Chandan Malakar</div>

<!-- ================= LIBRARIES ================= -->

<!-- Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- PNG Copy -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<!-- 🔥 FIREBASE (MUST LOAD BEFORE script.js) -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- ================= MAIN SCRIPT ================= -->
<script src="script.js"></script>

</body>
</html>
