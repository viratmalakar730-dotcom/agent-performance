<!DOCTYPE html>
<html>
<head>
<title>Live Agent Performance Dashboard</title>
<link rel="stylesheet" href="style.css">

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

</head>

<body>

<h2>Live Agent Performance Dashboard</h2>

<!-- 🔥 SUMMARY CARDS -->
<div class="cards">
    <div class="card">IVR Hit<br><span id="ivr"></span></div>
    <div class="card">Total Mature Calls<br><span id="total"></span></div>
    <div class="card">IB Mature<br><span id="ib"></span></div>
    <div class="card">OB Mature<br><span id="ob"></span></div>
    <div class="card">Overall AHT<br><span id="aht"></span></div>
</div>

<!-- 📊 TABLE -->
<table id="table">
<thead>
<tr>
<th>Employee ID</th>
<th>Agent Full Name</th>
<th>Total Login</th>
<th>Net Login</th>
<th>Total Break</th>
<th>Total Meeting</th>
<th>AHT</th>
<th>Total Mature Call</th>
<th>IB Mature</th>
<th>OB Mature</th>
</tr>
</thead>
<tbody></tbody>
</table>

<!-- ❤️ FOOTER -->
<div style="text-align:center; margin-top:20px; font-weight:bold;">
    ❤️ Powered by Chandan Malakar ❤️
</div>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCzPyZwPnSST3lv1pnSibq3dQjVIg2o-xs",
  authDomain: "agent-performance-live.firebaseapp.com",
  databaseURL: "https://agent-performance-live-default-rtdb.firebaseio.com",
  projectId: "agent-performance-live"
};

// 🔥 INIT
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

const db = firebase.database();

// 🔥 TIME FORMAT
function toTime(sec){
    sec = Math.max(0, Math.round(sec));
    let h = Math.floor(sec/3600);
    let m = Math.floor((sec%3600)/60);
    let s = sec%60;
    return [h,m,s].map(v=>String(v).padStart(2,'0')).join(":");
}

// 🔥 COLOR LOGIC
function getGradientClass(val,max){
    let p = val/max;
    if(p >= 0.75) return "green";
    if(p >= 0.45) return "yellow";
    return "red";
}

// 🔥 LIVE DATA LISTENER
db.ref("liveData").on("value", snap => {

    let d = snap.val();
    if(!d) return;

    let final = d.final || [];   // ✅ FIXED
    let ivr = d.ivr || 0;

    let tb = document.querySelector("#table tbody");
    tb.innerHTML = "";

    let totalCalls=0,totalIB=0,totalOB=0,totalTalk=0;

    if(final.length === 0) return;

    final.sort((a,b)=>b.total - a.total);

    let max = Math.max(...final.map(x=>x.total));

    final.forEach(r=>{

        totalCalls+=r.total;
        totalIB+=r.ib;
        totalOB+=r.ob;
        totalTalk+=(r.aht*r.total);

        let callCls=getGradientClass(r.total,max);

        let netCls=r.net>=28800?"netGreen":"";
        let breakCls=r.breakTime>2100?"breakRed":"";
        let meetingCls=r.meeting>2100?"meetingRed":"";

        let tr=document.createElement("tr");

        tr.innerHTML=`
        <td><b><i>${r.emp}</i></b></td>
        <td><b><i>${r.name}</i></b></td>
        <td>${toTime(r.login)}</td>
        <td class="${netCls}">${toTime(r.net)}</td>
        <td class="${breakCls}">${toTime(r.breakTime)}</td>
        <td class="${meetingCls}">${toTime(r.meeting)}</td>
        <td>${toTime(r.aht)}</td>
        <td class="${callCls}">${r.total}</td>
        <td>${r.ib}</td>
        <td>${r.ob}</td>
        `;

        tb.appendChild(tr);
    });

    // 🔥 SUMMARY
    document.getElementById("ivr").innerText=ivr;
    document.getElementById("total").innerText=totalCalls;
    document.getElementById("ib").innerText=totalIB;
    document.getElementById("ob").innerText=totalOB;

    let overallAHT=totalCalls?totalTalk/totalCalls:0;
    document.getElementById("aht").innerText=toTime(overallAHT);

});

</script>

</body>
</html>
